<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vita Food | תפריט דיגיטלי חכם</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff9800;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #333333;
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; overflow-x: hidden; scroll-behavior: smooth; }

        /* Header */
        .header { text-align: center; padding: 60px 20px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1550547660-d9450f859349?w=1000'); background-size: cover; background-position: center; }
        .header h1 { color: var(--primary-orange); font-size: 3rem; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-weight: 800; }
        .header p { margin-top: 10px; font-size: 1.2rem; opacity: 0.9; }

        /* Nav Section */
        .nav-section { position: sticky; top: 0; background-color: var(--bg-color); z-index: 1000; padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        .tabs-container { display: flex; overflow-x: auto; gap: 12px; padding: 0 15px; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-button { padding: 10px 22px; background: var(--card-bg); border: 1px solid var(--border-color); color: white; border-radius: 25px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: 0.3s; font-size: 1rem; }
        .tab-button.active { background: var(--primary-orange); color: black; border-color: var(--primary-orange); }

        /* Category Sections */
        .category-section { padding: 20px 0; border-bottom: 1px solid #222; }
        .category-title { padding: 0 20px; color: var(--primary-orange); font-size: 1.8rem; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }

        /* Menu Grid */
        .menu-grid { padding: 0 20px; display: grid; gap: 15px; }
        .menu-item { background-color: var(--card-bg); border-radius: 15px; overflow: hidden; display: flex; height: 110px; border: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; }
        .item-content { flex: 1; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .item-content h3 { margin: 0; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-content p { margin: 4px 0; color: #aaa; font-size: 0.85rem; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-price { font-weight: bold; color: var(--primary-orange); font-size: 1.1rem; }
        .item-image { width: 110px; height: 110px; background-size: cover; background-position: center; flex-shrink: 0; }

        /* Review FAB */
        .review-wrapper { position: fixed; bottom: 25px; right: 20px; display: flex; align-items: center; gap: 10px; z-index: 2000; cursor: pointer; opacity: 0; visibility: hidden; transform: translateY(20px); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .review-wrapper.visible { opacity: 1; visibility: visible; transform: translateY(0); }
        .review-label { background: var(--primary-orange); color: black; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .review-fab { background-color: var(--primary-orange); width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(255,152,0,0.4); animation: pulse 2s infinite; font-size: 24px; }
        
        /* Stars & Modal */
        .stars-container { display: flex; justify-content: center; gap: 8px; margin: 25px 0; font-size: 2.5rem; }
        .star { cursor: pointer; color: #333; transition: 0.2s; }
        .star.active { color: var(--primary-orange); }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); border-radius: 20px; text-align: center; width: 95%; max-width: 450px; border: 1px solid var(--border-color); position: relative; overflow: hidden; }
        .large-item-image { width: 100%; height: 250px; background-size: cover; background-position: center; }
        .item-info-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; text-align: right; }
        .extras-section { padding: 20px; border-top: 1px solid #333; text-align: right; }
        .extra-item { display: flex; justify-content: space-between; background: #222; padding: 12px; border-radius: 10px; margin-top: 5px; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; color: white; cursor: pointer; z-index: 10; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; line-height: 35px; }
        .hidden { display: none; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary-orange); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: black; font-size: 1.1rem; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>VITA FOOD</h1>
        <p id="promo-text">מסעדה בשכונה בחיפה</p>
    </div>

    <div class="nav-section">
        <div id="categories-container" class="tabs-container"></div>
    </div>

    <div id="main-menu-content"></div>

    <div class="review-wrapper" id="review-booster" onclick="window.openReviewModal()">
        <div class="review-label">פרגנו לנו ב-5 כוכבים ⭐</div>
        <div class="review-fab">📝</div>
    </div>

    <div id="item-modal" class="modal-overlay" onclick="if(event.target == this) closeItemModal()">
        <div class="modal-content">
            <span class="close-btn" onclick="closeItemModal()">&times;</span>
            <div id="modal-item-image" class="large-item-image"></div>
            <div class="item-info-header">
                <h2 id="modal-item-name" style="margin:0;"></h2>
                <span id="modal-item-price" style="color:var(--primary-orange); font-size:1.5rem; font-weight:800;"></span>
            </div>
            <p id="modal-item-desc" style="padding: 0 20px; color: #ccc; text-align: right;"></p>
            <div class="extras-section" id="modal-extras-section">
                <h3>תוספות למנה:</h3>
                <div id="modal-item-extras"></div>
            </div>
            <div style="padding: 20px;">
                <button class="btn-submit" onclick="closeItemModal()">חזרה לתפריט</button>
            </div>
        </div>
    </div>

    <div id="review-modal" class="modal-overlay" onclick="if(event.target == this) window.closeReviewModal()">
        <div class="modal-content" style="padding: 30px;">
            <h2 id="review-title">איך הייתה החוויה?</h2>
            <div class="stars-container" id="stars-div">
                <span class="star" onclick="window.handleRating(1)">★</span>
                <span class="star" onclick="window.handleRating(2)">★</span>
                <span class="star" onclick="window.handleRating(3)">★</span>
                <span class="star" onclick="window.handleRating(4)">★</span>
                <span class="star" onclick="window.handleRating(5)">★</span>
            </div>
            <div id="feedback-area" class="hidden">
                <textarea id="low-rating-text" style="width:100%; height:100px; border-radius:10px; padding:12px; background:#111; color:white; border:1px solid #444;" placeholder="מה נוכל לשפר?"></textarea>
                <button class="btn-submit" style="margin-top:15px;" onclick="window.submitReviewToFirebase()">שלח משוב לבעלים</button>
            </div>
            <button onclick="window.closeReviewModal()" style="margin-top:15px; background:none; border:none; color:#777; cursor:pointer;">סגור</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYZxPjSML1gHTTANx0Fp6TlhI5_ookHNU",
            authDomain: "hevresbar.firebaseapp.com",
            projectId: "hevresbar",
            storageBucket: "hevresbar.firebasestorage.app",
            messagingSenderId: "737238391891",
            appId: "1:737238391891:web:ad0076917e2f7133eb7aa6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const BUSINESS_ID = "vitafood";
        const GOOGLE_LINK = "https://search.google.com/local/writereview?placeid=ChIJg-W3-05THBURSuuTalV3WlI";

        let allItems = [];
        const cats = ['עסקיות', 'המבורגרים', 'עיקריות', 'מנות ילדים', 'משקאות'];

        // מעקב סריקות
        addDoc(collection(db, "scans"), { businessId: BUSINESS_ID, timestamp: serverTimestamp() });

        // טעינת הגדרות
        onSnapshot(doc(db, "settings", BUSINESS_ID), (s) => {
            if(s.exists()) document.getElementById('promo-text').innerText = s.data().promoText || "";
        });

        // טעינת מנות
        const q = query(collection(db, "menus"), where("businessId", "==", BUSINESS_ID));
        onSnapshot(q, (s) => {
            allItems = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTabs();
            renderMenuByCategories();
        });

        function renderTabs() {
            const container = document.getElementById('categories-container');
            container.innerHTML = cats.map(c => `<button class="tab-button" id="tab-${c}" onclick="window.scrollToCategory('${c}')">${c}</button>`).join('');
            updateActiveTab(cats[0]);
        }

        window.scrollToCategory = (catName) => {
            const element = document.getElementById(`section-${catName}`);
            if (element) {
                const offset = 80;
                const bodyRect = document.body.getBoundingClientRect().top;
                const elementRect = element.getBoundingClientRect().top;
                window.scrollTo({ top: elementRect - bodyRect - offset, behavior: 'smooth' });
            }
        };

        function renderMenuByCategories() {
            const container = document.getElementById('main-menu-content');
            container.innerHTML = cats.map(cat => {
                // סינון: רק מנות שהן במלאי (isAvailable !== false) יוצגו ללקוח
                const items = allItems.filter(i => i.category === cat && i.isAvailable !== false);
                if (items.length === 0) return '';
                return `
                    <div class="category-section" id="section-${cat}">
                        <div class="category-title">${cat}</div>
                        <div class="menu-grid">${items.map(i => `
                            <div class="menu-item" onclick="window.openItemDetails('${i.id}')">
                                <div class="item-content">
                                    <div><h3>${i.name}</h3><p>${i.desc || ''}</p></div>
                                    <div class="item-price">₪${i.price}</div>
                                </div>
                                <div class="item-image" style="background-image: url('${i.imageUrl || 'https://via.placeholder.com/110'}')"></div>
                            </div>`).join('')}
                        </div>
                    </div>`;
            }).join('');
        }

        window.addEventListener('scroll', () => {
            const reviewBtn = document.getElementById('review-booster');
            if (window.scrollY > 400) { reviewBtn.classList.add('visible'); } 
            else { reviewBtn.classList.remove('visible'); }

            let current = "";
            cats.forEach(cat => {
                const section = document.getElementById(`section-${cat}`);
                if (section && pageYOffset >= section.offsetTop - 120) current = cat;
            });
            if (current) updateActiveTab(current);
        });

        function updateActiveTab(catName) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`tab-${catName}`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        window.openItemDetails = (id) => {
            const i = allItems.find(x => x.id === id);
            if(!i) return;
            document.getElementById('modal-item-name').innerText = i.name;
            document.getElementById('modal-item-price').innerText = `₪${i.price}`;
            document.getElementById('modal-item-desc').innerText = i.desc || "מנה מובחרת.";
            document.getElementById('modal-item-image').style.backgroundImage = `url('${i.imageUrl || ''}')`;
            const sec = document.getElementById('modal-extras-section');
            if(i.extras && i.extras.length > 0){
                sec.style.display = 'block';
                document.getElementById('modal-item-extras').innerHTML = i.extras.map(e => `<div class="extra-item"><span>${e.name}</span><span>+ ₪${e.price}</span></div>`).join('');
            } else { sec.style.display = 'none'; }
            document.getElementById('item-modal').style.display = 'flex';
        };

        window.closeItemModal = () => document.getElementById('item-modal').style.display = 'none';

        /* לוגיקת ביקורות */
        window.openReviewModal = () => document.getElementById('review-modal').style.display = 'flex';
        window.closeReviewModal = () => {
            document.getElementById('review-modal').style.display = 'none';
            document.getElementById('stars-div').classList.remove('hidden');
            document.getElementById('feedback-area').classList.add('hidden');
        };

        window.handleRating = async (rating) => {
            document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < rating));
            if (rating >= 4) {
                await addDoc(collection(db, "reviews"), { businessId: BUSINESS_ID, rating, timestamp: serverTimestamp(), type: "positive" });
                window.open(GOOGLE_LINK, '_blank');
                window.closeReviewModal();
            } else {
                window.lastRating = rating;
                document.getElementById('stars-div').classList.add('hidden');
                document.getElementById('feedback-area').classList.remove('hidden');
            }
        };

        window.submitReviewToFirebase = async () => {
            const text = document.getElementById('low-rating-text').value;
            await addDoc(collection(db, "reviews"), { businessId: BUSINESS_ID, rating: window.lastRating, text, timestamp: serverTimestamp(), type: "improvement" });
            document.getElementById('feedback-area').innerHTML = "<h3 style='color:var(--primary-orange)'>תודה על המשוב! אנחנו נשתפר.</h3>";
            setTimeout(window.closeReviewModal, 2000);
        };
    </script>
</body>
</html>
