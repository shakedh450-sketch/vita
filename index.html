<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vita Food - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff9800;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 0;
        }

        /* Header & Logo */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1550547660-d9450f859349?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
        }

        .header h1 {
            color: var(--primary-orange);
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
        }

        /* Tabs System */
        .tabs-wrapper {
            position: sticky;
            top: 0;
            background-color: var(--bg-dark);
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            padding: 10px 0;
        }

        .tabs-container {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            gap: 12px;
            padding: 5px 15px;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }

        .tabs-container::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

        .tab-button {
            padding: 8px 20px;
            background: transparent;
            border: 2px solid var(--primary-orange);
            color: white;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-button.active {
            background-color: var(--primary-orange);
            color: black;
        }

        /* Menu Grid */
        .menu-grid {
            padding: 20px;
            display: grid;
            gap: 15px;
        }

        .menu-item {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid var(--primary-orange);
            animation: fadeIn 0.5s ease;
        }

        .item-info h3 { margin: 0 0 5px 0; font-size: 1.2rem; }
        .item-info p { margin: 0; color: #aaa; font-size: 0.9rem; }
        .item-price { font-weight: bold; color: var(--primary-orange); font-size: 1.1rem; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>VITA FOOD</h1>
        <p>Premium Burgers & Meat</p>
    </div>

    <div class="tabs-wrapper">
        <div id="categories-container" class="tabs-container">
            </div>
    </div>

    <div id="menu-container" class="menu-grid">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- הדבק כאן את ה-CONFIG שלך ---
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAhBcHYHkYgkgdq04hvdg5o-HaSWYb645g",
  authDomain: "hevres.firebaseapp.com",
  projectId: "hevres",
  storageBucket: "hevres.firebasestorage.app",
  messagingSenderId: "135029926033",
  appId: "1:135029926033:web:9605d82e4dddb5cc4d3730",
  measurementId: "G-HVFBN7QP0R"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allItems = [];

        async function loadMenu() {
            try {
                const querySnapshot = await getDocs(collection(db, "menu_vitafood"));
                allItems = querySnapshot.docs.map(doc => doc.data());
                
                renderTabs(allItems);
                renderMenu(allItems);
            } catch (error) {
                console.error("Error loading menu:", error);
            }
        }

        function renderTabs(items) {
            const container = document.getElementById('categories-container');
            const categories = ['הכל', ...new Set(items.map(item => item.category))];
            
            container.innerHTML = categories.map(cat => `
                <button class="tab-button ${cat === 'הכל' ? 'active' : ''}" 
                        onclick="window.filterMenu('${cat}', this)">
                    ${cat}
                </button>
            `).join('');
        }

        function renderMenu(items) {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(item => `
                <div class="menu-item">
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p>${item.description || ''}</p>
                    </div>
                    <div class="item-price">₪${item.price}</div>
                </div>
            `).join('');
        }

        // Global filter function
        window.filterMenu = (category, button) => {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            const filtered = category === 'הכל' 
                ? allItems 
                : allItems.filter(item => item.category === category);
            
            renderMenu(filtered);
        };

        loadMenu();
    </script>
</body>
</html>
