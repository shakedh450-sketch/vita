<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vita Food | תפריט דיגיטלי חכם</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff9800;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #333333;
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; overflow-x: hidden; scroll-behavior: smooth; }

        /* Header */
        .header { text-align: center; padding: 80px 20px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1550547660-d9450f859349?w=1000'); background-size: cover; background-position: center; }
        .header h1 { color: var(--primary-orange); font-size: 3.5rem; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-weight: 800; }

        /* Nav Section */
        .nav-section { position: sticky; top: 0; background-color: var(--bg-color); z-index: 1000; padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        .tabs-container { display: flex; overflow-x: auto; gap: 12px; padding: 0 15px; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-button { padding: 10px 22px; background: var(--card-bg); border: 1px solid var(--border-color); color: white; border-radius: 25px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: 0.3s; font-size: 1rem; }
        .tab-button.active { background: var(--primary-orange); color: black; border-color: var(--primary-orange); }

        /* Menu Grid */
        .category-section { padding: 20px 0; border-bottom: 1px solid #222; }
        .category-title { padding: 0 20px; color: var(--primary-orange); font-size: 1.8rem; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; }
        .menu-grid { padding: 0 20px; display: grid; gap: 15px; }
        .menu-item { background-color: var(--card-bg); border-radius: 15px; overflow: hidden; display: flex; height: 110px; border: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; }
        .item-content { flex: 1; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .item-content h3 { margin: 0; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-content p { margin: 4px 0; color: #aaa; font-size: 0.85rem; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-price { font-weight: bold; color: var(--primary-orange); font-size: 1.1rem; }
        .item-image { width: 110px; height: 110px; background-size: cover; background-position: center; flex-shrink: 0; }

        /* Modals - Symmetric Grid Centering */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none !important;
            z-index: 4000; backdrop-filter: blur(10px);
            display: grid; place-items: center;
        }

        .modal-content {
            background: var(--card-bg); border-radius: 25px; text-align: center;
            width: calc(100% - 30px); max-width: 420px;
            border: 1px solid var(--border-color);
            position: relative; overflow: hidden;
            max-height: 90vh; display: flex; flex-direction: column;
            margin: auto;
        }
        
        .large-item-image { width: 100%; height: 220px; background-size: cover; background-position: center; flex-shrink: 0; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 30px; color: white; cursor: pointer; z-index: 5000; background: rgba(0,0,0,0.6); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .modal-body { overflow-y: auto; padding: 0 15px 20px 15px; scrollbar-width: none; }
        .modal-body::-webkit-scrollbar { display: none; }
        
        #modal-item-extras { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .extra-item { display: flex; justify-content: space-between; background: #252525; padding: 10px; border-radius: 12px; border: 1px solid #333; font-size: 0.85rem; }
        .extra-item span:last-child { color: var(--primary-orange); font-weight: bold; }

        .btn-submit { width: 100%; padding: 16px; background: var(--primary-orange); border: none; border-radius: 14px; font-weight: bold; cursor: pointer; color: black; font-size: 1.1rem; margin-top: 20px; }

        /* Footer & Review */
        .footer-disclaimer { text-align: center; padding: 40px 20px; color: #666; font-size: 0.85rem; border-top: 1px solid #222; background: #0a0a0a; }
        .review-section { background: #1a1a1a; padding: 50px 20px; text-align: center; border-top: 1px solid var(--border-color); }
        .review-section h2 { color: var(--primary-orange); font-size: 1.8rem; margin-bottom: 10px; font-weight: 800; }
        .static-stars { display: flex; justify-content: center; gap: 12px; font-size: 3rem; margin-bottom: 10px; }
        .static-star { cursor: pointer; color: #333; transition: 0.3s; }
        .static-star.active { color: var(--primary-orange); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>VITA FOOD</h1>
    </div>

    <div class="nav-section">
        <div id="categories-container" class="tabs-container"></div>
    </div>

    <div id="main-menu-content"></div>

    <footer class="footer-disclaimer">
        <h2 style="color:var(--primary-orange); margin-bottom: 5px;">VITA FOOD</h2>
        <p>עפולה</p>
        <p style="margin-top: 20px; font-weight: bold;">* כל התמונות באתר הן להמחשה בלבד</p>
    </footer>

    <div class="review-section">
        <h2>נהניתם? פרגנו לנו! ⭐</h2>
        <p>המשוב שלכם עוזר לנו להשתפר.</p>
        <div class="static-stars" id="main-stars">
            <span class="static-star" onclick="window.handleRating(1)">★</span>
            <span class="static-star" onclick="window.handleRating(2)">★</span>
            <span class="static-star" onclick="window.handleRating(3)">★</span>
            <span class="static-star" onclick="window.handleRating(4)">★</span>
            <span class="static-star" onclick="window.handleRating(5)">★</span>
        </div>
    </div>

    <div id="item-modal" class="modal-overlay" style="display: none;" onclick="if(event.target == this) closeItemModal()">
        <div class="modal-content">
            <span class="close-btn" onclick="closeItemModal()">&times;</span>
            <div id="modal-item-image" class="large-item-image"></div>
            <div class="disclaimer-text" style="font-size:0.7rem; color:#888; padding: 5px;">* התמונה להמחשה בלבד</div>
            <div class="modal-body">
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0;">
                    <h2 id="modal-item-name" style="margin:0; font-size: 1.4rem;"></h2>
                    <span id="modal-item-price" style="color:var(--primary-orange); font-size:1.4rem; font-weight:800;"></span>
                </div>
                <p id="modal-item-desc" style="color: #ccc; text-align: right; margin-bottom: 15px;"></p>
                <div class="extras-section" id="modal-extras-section">
                    <h3 style="margin-bottom:10px; text-align: right; font-size: 1.1rem;">תוספות למנה:</h3>
                    <div id="modal-item-extras"></div>
                </div>
                <button class="btn-submit" onclick="closeItemModal()">חזרה לתפריט</button>
            </div>
        </div>
    </div>

    <div id="feedback-modal" class="modal-overlay" style="display: none;" onclick="if(event.target == this) window.closeFeedbackModal()">
        <div class="modal-content" style="padding:30px;">
            <h2 id="feedback-title" style="color:var(--primary-orange)">נשמח להשתפר 🛠️</h2>
            <p id="feedback-desc">איך הייתה החוויה שלכם?</p>
            
            <div id="modal-stars-div" class="static-stars" style="margin-top: 15px;">
                <span class="static-star modal-s" onclick="window.handleRating(1)">★</span>
                <span class="static-star modal-s" onclick="window.handleRating(2)">★</span>
                <span class="static-star modal-s" onclick="window.handleRating(3)">★</span>
                <span class="static-star modal-s" onclick="window.handleRating(4)">★</span>
                <span class="static-star modal-s" onclick="window.handleRating(5)">★</span>
            </div>

            <div id="feedback-form" class="hidden">
                <textarea id="feedback-text" style="width:100%; height:100px; border-radius:12px; padding:12px; background:#111; color:white; border:1px solid #444; margin-top:15px;" placeholder="ספרו לנו מה נוכל לשפר..."></textarea>
                <button class="btn-submit" onclick="window.submitFeedback()">שלח משוב</button>
            </div>
            <button onclick="window.closeFeedbackModal()" style="margin-top:15px; background:none; border:none; color:#777; cursor:pointer;">סגור</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYZxPjSML1gHTTANx0Fp6TlhI5_ookHNU",
            authDomain: "hevresbar.firebaseapp.com",
            projectId: "hevresbar",
            storageBucket: "hevresbar.firebasestorage.app",
            messagingSenderId: "737238391891",
            appId: "1:737238391891:web:ad0076917e2f7133eb7aa6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const B_ID = "vitafood";
        const GOOGLE_LINK = "https://search.google.com/local/writereview?placeid=ChIJg-W3-05THBURSuuTalV3WlI";

        let allItems = [];
        const cats = ['עסקיות', 'המבורגרים', 'עיקריות', 'מנות ילדים', 'תוספות בצד', 'משקאות', 'בירות'];
        let userActionCount = 0;
        
        window.addEventListener('load', () => {
            if (history.state) history.replaceState(null, "");
            history.pushState({ page: 'home' }, "");
        });

        window.addEventListener('click', () => userActionCount++, {passive: true});

        onSnapshot(query(collection(db, "menus"), where("businessId", "==", B_ID)), (s) => {
            allItems = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTabs();
            renderMenuByCategories();
        });

        function renderTabs() {
            const container = document.getElementById('categories-container');
            container.innerHTML = cats.map(c => `<button class="tab-button" id="tab-${c}" onclick="window.scrollToCategory('${c}')">${c}</button>`).join('');
            updateActiveTab(cats[0]);
        }

        window.scrollToCategory = (catName) => {
            const el = document.getElementById(`section-${catName}`);
            if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
        };

        function renderMenuByCategories() {
            const container = document.getElementById('main-menu-content');
            container.innerHTML = cats.map(cat => {
                const items = allItems.filter(i => i.category === cat && i.isAvailable !== false);
                if (items.length === 0) return '';
                return `
                    <div class="category-section" id="section-${cat}">
                        <div class="category-title">${cat}</div>
                        <div class="menu-grid">${items.map(i => `
                            <div class="menu-item" onclick="window.openItemDetails('${i.id}')">
                                <div class="item-content">
                                    <div><h3>${i.name}</h3><p>${i.desc || ''}</p></div>
                                    <div class="item-price">₪${i.price}</div>
                                </div>
                                <div class="item-image" style="background-image: url('${i.imageUrl || 'https://via.placeholder.com/110'}')"></div>
                            </div>`).join('')}
                        </div>
                    </div>`;
            }).join('');
        }

        window.addEventListener('scroll', () => {
            let current = "";
            cats.forEach(cat => {
                const section = document.getElementById(`section-${cat}`);
                if (section && pageYOffset >= section.offsetTop - 120) current = cat;
            });
            if (current) updateActiveTab(current);
        });

        function updateActiveTab(catName) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.toggle('active', btn.id === `tab-${catName}`));
        }

        window.openItemDetails = (id) => {
            const i = allItems.find(x => x.id === id);
            if(!i) return;
            history.pushState({ page: 'item' }, "");
            document.getElementById('modal-item-name').innerText = i.name;
            document.getElementById('modal-item-price').innerText = `₪${i.price}`;
            document.getElementById('modal-item-desc').innerText = i.desc || "";
            document.getElementById('modal-item-image').style.backgroundImage = `url('${i.imageUrl || ''}')`;
            const sec = document.getElementById('modal-extras-section');
            if(i.extras && i.extras.length > 0){
                sec.style.display = 'block';
                document.getElementById('modal-item-extras').innerHTML = i.extras.map(e => `<div class="extra-item"><span>${e.name}</span><span>+ ₪${e.price}</span></div>`).join('');
            } else { sec.style.display = 'none'; }
            document.getElementById('item-modal').setAttribute('style', 'display: grid !important');
        };

        window.closeItemModal = (fromBack = false) => {
            document.getElementById('item-modal').setAttribute('style', 'display: none !important');
            if(!fromBack && history.state?.page === 'item') history.back();
        };

        window.onpopstate = (event) => {
            if (document.getElementById('item-modal').style.display.includes('grid')) {
                window.closeItemModal(true);
                return;
            }
            if (document.getElementById('feedback-modal').style.display.includes('grid')) {
                window.closeFeedbackModal();
                return;
            }
            if (!event.state && userActionCount > 0) {
                history.pushState({ page: 'home' }, "");
                window.openExitReview();
            }
        };

        /* לוגיקת דירוג מתוקנת */
        window.handleRating = async (rating) => {
            // צביעת כוכבים בשני המקומות
            document.querySelectorAll('.static-star').forEach((s, i) => s.classList.toggle('active', i < rating));
            document.querySelectorAll('.modal-s').forEach((s, i) => s.classList.toggle('active', i < rating));

            if (rating >= 4) {
                window.open(GOOGLE_LINK, '_blank');
                addDoc(collection(db, "reviews"), { businessId: B_ID, rating, timestamp: serverTimestamp(), type: "positive" });
                window.closeFeedbackModal();
            } else {
                window.lastRating = rating;
                // עדכון המודל למצב של "שליחת משוב"
                document.getElementById('feedback-title').innerText = "נשמח להשתפר 🛠️";
                document.getElementById('feedback-desc').innerText = "מה נוכל לשפר בפעם הבאה?";
                document.getElementById('modal-stars-div').classList.add('hidden');
                document.getElementById('feedback-form').classList.remove('hidden');
                document.getElementById('feedback-modal').setAttribute('style', 'display: grid !important');
            }
        };

        window.openExitReview = () => {
            document.getElementById('feedback-title').innerText = "נהניתם מהתפריט? ✨";
            document.getElementById('feedback-desc').innerText = "נשמח לדירוג קצר לפני שאתם הולכים:";
            document.getElementById('modal-stars-div').classList.remove('hidden');
            document.getElementById('feedback-form').classList.add('hidden');
            document.getElementById('feedback-modal').setAttribute('style', 'display: grid !important');
        };

        window.closeFeedbackModal = () => document.getElementById('feedback-modal').setAttribute('style', 'display: none !important');

        window.submitFeedback = async () => {
            const text = document.getElementById('feedback-text').value;
            if(!text) return alert("אנא כתבו לנו משהו קטן...");
            await addDoc(collection(db, "reviews"), { businessId: B_ID, rating: window.lastRating, text, timestamp: serverTimestamp(), type: "improvement" });
            alert("תודה על המשוב!");
            window.closeFeedbackModal();
        };
    </script>
</body>
</html>
