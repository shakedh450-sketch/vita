<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vita Food | תפריט דיגיטלי חכם</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff9800;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #333333;
            --success-green: #4caf50;
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; overflow-x: hidden; }

        /* Header */
        .header { text-align: center; padding: 40px 20px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1550547660-d9450f859349?w=1000'); background-size: cover; background-position: center; }
        .header h1 { color: var(--primary-orange); font-size: 2.5rem; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* Nav Section */
        .nav-section { position: sticky; top: 0; background-color: var(--bg-color); z-index: 1000; padding-top: 15px; border-bottom: 1px solid var(--border-color); }
        .search-container { padding: 0 15px 15px 15px; }
        .search-input { width: 100%; padding: 12px 15px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; color: white; box-sizing: border-box; font-family: 'Assistant', sans-serif; font-size: 1rem; }
        .tabs-container { display: flex; overflow-x: auto; gap: 12px; padding: 0 15px 15px 15px; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-button { padding: 8px 20px; background: var(--card-bg); border: 1px solid var(--border-color); color: white; border-radius: 20px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tab-button.active { background: var(--primary-orange); color: black; border-color: var(--primary-orange); }

        /* Menu Grid */
        .menu-grid { padding: 20px; display: grid; gap: 15px; }
        .menu-item { background-color: var(--card-bg); border-radius: 15px; overflow: hidden; display: flex; height: 110px; border: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; animation: fadeIn 0.4s ease; }
        .menu-item:active { transform: scale(0.98); }
        .item-content { flex: 1; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .item-content h3 { margin: 0; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-content p { margin: 4px 0; color: #aaa; font-size: 0.85rem; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-price { font-weight: bold; color: var(--primary-orange); font-size: 1.1rem; }
        .item-image { width: 110px; height: 110px; background-size: cover; background-position: center; flex-shrink: 0; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); border-radius: 20px; text-align: center; width: 90%; max-width: 450px; border: 1px solid var(--border-color); position: relative; overflow: hidden; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; color: white; cursor: pointer; z-index: 10; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; line-height: 35px; }

        /* Item Modal Detail */
        .large-item-image { width: 100%; height: 250px; background-size: cover; background-position: center; }
        .item-info-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 10px; text-align: right; }
        .large-price { font-size: 1.5rem; font-weight: 800; color: var(--primary-orange); }
        .full-description { padding: 0 20px; color: #ccc; line-height: 1.5; text-align: right; margin-bottom: 20px; }
        
        .extras-section { padding: 20px; border-top: 1px solid #333; text-align: right; display: none; } /* חבוי כברירת מחדל */
        .extras-list { display: grid; gap: 10px; margin-top: 10px; }
        .extra-item { display: flex; justify-content: space-between; background: #222; padding: 12px; border-radius: 10px; border: 1px solid #444; }

        /* Review Booster (FAB) */
        .review-wrapper { position: fixed; bottom: 25px; left: 25px; display: flex; align-items: center; gap: 10px; z-index: 2000; cursor: pointer; }
        .review-label { background: var(--primary-orange); color: black; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .review-fab { background-color: var(--primary-orange); width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(255,152,0,0.4); animation: pulse 2s infinite; }
        
        .stars-container { display: flex; justify-content: center; gap: 8px; margin: 25px 0; font-size: 2.5rem; }
        .star { cursor: pointer; color: #333; transition: 0.2s; }
        .star.active { color: var(--primary-orange); }
        .hidden { display: none; }
        .btn-submit { margin: 15px 0; padding: 15px; background: var(--primary-orange); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>VITA FOOD</h1>
        <p>Premium Burgers & Smokehouse</p>
    </div>

    <div class="nav-section">
        <div class="search-container">
            <input type="text" id="menu-search" class="search-input" placeholder="חפש מנה...">
        </div>
        <div id="categories-container" class="tabs-container"></div>
    </div>

    <div id="menu-container" class="menu-grid"></div>

    <div class="review-wrapper" onclick="openReviewModal()">
        <div class="review-label">פרגנו לנו ב-5 כוכבים ⭐</div>
        <div class="review-fab"><span style="font-size: 28px;">📝</span></div>
    </div>

    <div id="item-modal" class="modal-overlay" onclick="if(event.target == this) closeItemModal()">
        <div class="modal-content">
            <span class="close-btn" onclick="closeItemModal()">&times;</span>
            <div id="modal-item-image" class="large-item-image"></div>
            <div class="item-info-header">
                <h2 id="modal-item-name" style="margin:0;"></h2>
                <span id="modal-item-price" class="large-price"></span>
            </div>
            <p id="modal-item-desc" class="full-description"></p>
            <div class="extras-section" id="modal-extras-section">
                <h3 style="margin-bottom:10px; color:var(--primary-orange);">תוספות למנה:</h3>
                <div id="modal-item-extras" class="extras-list"></div>
            </div>
            <div style="padding: 0 20px 20px;">
                <button class="btn-submit" onclick="closeItemModal()">חזרה לתפריט</button>
            </div>
        </div>
    </div>

    <div id="review-modal" class="modal-overlay">
        <div class="modal-content" style="padding: 30px;">
            <h2 id="review-title">איך הייתה החוויה?</h2>
            <div class="stars-container" id="stars-div">
                <span class="star" onclick="handleRating(1)">★</span>
                <span class="star" onclick="handleRating(2)">★</span>
                <span class="star" onclick="handleRating(3)">★</span>
                <span class="star" onclick="handleRating(4)">★</span>
                <span class="star" onclick="handleRating(5)">★</span>
            </div>
            <div id="feedback-area" class="hidden">
                <textarea id="low-rating-text" style="width:100%; height:100px; border-radius:10px; padding:12px; background:#111; color:white; border:1px solid #444;" placeholder="מה נוכל לשפר?"></textarea>
                <button class="btn-submit" id="submit-feedback-btn" onclick="submitToFirebase()">שלח משוב לבעלים</button>
            </div>
            <button onclick="closeReviewModal()" style="margin-top:15px; background:none; border:none; color:#777; cursor:pointer;">סגור</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhBcHYHkYgkgdq04hvdg5o-HaSWYb645g",
            authDomain: "hevres.firebaseapp.com",
            projectId: "hevres",
            storageBucket: "hevres.firebasestorage.app",
            messagingSenderId: "135029926033",
            appId: "1:135029926033:web:9605d82e4dddb5cc4d3730"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const GOOGLE_LINK = "https://search.google.com/local/writereview?placeid=ChIJg-W3-05THBURSuuTalV3WlI";

        let allItems = [];
        let currentCategory = 'הכל';

        async function loadMenu() {
            try {
                const querySnapshot = await getDocs(collection(db, "menu_vitafood"));
                allItems = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTabs();
                renderMenu(allItems);
            } catch (e) { console.error(e); }
        }

        function renderTabs() {
            const container = document.getElementById('categories-container');
            const categories = ['הכל', ...new Set(allItems.map(item => item.category))];
            container.innerHTML = categories.map(cat => `
                <button class="tab-button ${cat === currentCategory ? 'active' : ''}" onclick="window.setCategory('${cat}', this)">
                    ${cat === 'burgers' ? 'המבורגרים' : cat === 'sides' ? 'תוספות' : cat === 'drinks' ? 'שתייה' : cat}
                </button>
            `).join('');
        }

        function renderMenu(items) {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(item => `
                <div class="menu-item" onclick="window.openItemDetails('${item.id}')">
                    <div class="item-content">
                        <div><h3>${item.name}</h3><p>${item.desc || item.description || ''}</p></div>
                        <div class="item-price">₪${item.price}</div>
                    </div>
                    <div class="item-image" style="background-image: url('${item.imageUrl}')"></div>
                </div>
            `).join('');
        }

        window.setCategory = (cat, btn) => {
            currentCategory = cat;
            renderTabs();
            applyFilters();
        };

        function applyFilters() {
            const term = document.getElementById('menu-search').value.toLowerCase();
            const filtered = allItems.filter(i => {
                const matchesCat = currentCategory === 'הכל' || i.category === currentCategory;
                return matchesCat && i.name.toLowerCase().includes(term);
            });
            renderMenu(filtered);
        }

        /* --- מודאל מנה עם בדיקת קטגוריה --- */
        window.openItemDetails = (itemId) => {
            const item = allItems.find(i => i.id === itemId);
            if (!item) return;

            document.getElementById('modal-item-name').innerText = item.name;
            document.getElementById('modal-item-price').innerText = `₪${item.price}`;
            document.getElementById('modal-item-desc').innerText = item.desc || item.description || "מנה מובחרת מחומרי גלם טריים.";
            document.getElementById('modal-item-image').style.backgroundImage = `url('${item.imageUrl}')`;

            const extrasSection = document.getElementById('modal-extras-section');
            
            // בדיקת קטגוריה: רק אם הקטגוריה היא burgers נציג תוספות
            if (item.category === 'burgers') {
                extrasSection.style.display = 'block';
                const extrasList = document.getElementById('modal-item-extras');
                const extras = item.extras || [
                    {name: "בצל מקורמל", price: 6},
                    {name: "ביצת עין", price: 8},
                    {name: "פטריות חמות", price: 8},
                    {name: "ריבת בצל", price: 8}
                ];
                extrasList.innerHTML = extras.map(ex => `
                    <div class="extra-item"><span>${ex.name}</span><span style="color:var(--primary-orange)">+ ₪${ex.price}</span></div>
                `).join('');
            } else {
                extrasSection.style.display = 'none';
            }

            document.getElementById('item-modal').style.display = 'flex';
        };

        window.closeItemModal = () => document.getElementById('item-modal').style.display = 'none';

        /* --- מערכת ביקורות --- */
        window.openReviewModal = () => document.getElementById('review-modal').style.display = 'flex';
        window.closeReviewModal = () => { document.getElementById('review-modal').style.display = 'none'; resetReview(); };

        window.handleRating = async (rating) => {
            document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < rating));
            if (rating >= 4) {
                await addDoc(collection(db, "feedback_vitafood"), { rating, timestamp: serverTimestamp(), type: "positive" });
                window.open(GOOGLE_LINK, '_blank');
                closeReviewModal();
            } else {
                window.lastRating = rating;
                document.getElementById('stars-div').classList.add('hidden');
                document.getElementById('feedback-area').classList.remove('hidden');
            }
        };

        window.submitToFirebase = async () => {
            const text = document.getElementById('low-rating-text').value;
            await addDoc(collection(db, "feedback_vitafood"), { rating: window.lastRating, text, timestamp: serverTimestamp(), type: "improvement" });
            document.getElementById('feedback-area').innerHTML = "<h3>תודה על המשוב!</h3>";
            setTimeout(closeReviewModal, 2000);
        };

        function resetReview() {
            document.getElementById('stars-div').classList.remove('hidden');
            document.getElementById('feedback-area').classList.add('hidden');
            document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
        }

        document.getElementById('menu-search').addEventListener('input', applyFilters);
        loadMenu();
    </script>
</body>
</html>
