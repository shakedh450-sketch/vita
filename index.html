<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vita Food | Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff9800;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --sub-text: #bbbbbb;
            --border-color: #333333;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        .header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1550547660-d9450f859349?w=1000');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .header h1 { color: var(--primary-orange); font-size: 2.5rem; margin: 0; }

        .tabs-wrapper {
            position: sticky;
            top: 0;
            background-color: var(--bg-color);
            z-index: 1000;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .tabs-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 0 15px;
            scrollbar-width: none;
        }

        .tab-button {
            padding: 8px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .tab-button.active {
            background: var(--primary-orange);
            color: black;
        }

        .menu-grid { padding: 20px; display: grid; gap: 15px; }

        .menu-item {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            height: 110px;
            border: 1px solid var(--border-color);
        }

        .item-content {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-content h3 { margin: 0; font-size: 1.1rem; }
        .item-content p { margin: 4px 0; color: var(--sub-text); font-size: 0.85rem; }
        .item-price { font-weight: bold; color: var(--primary-orange); font-size: 1.1rem; }

        .item-image {
            width: 110px;
            height: 110px;
            background-size: cover;
            background-position: center;
            background-color: #333;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>VITA FOOD</h1>
        <p>Premium Burgers & Smokehouse</p>
    </div>

    <div class="tabs-wrapper">
        <div id="categories-container" class="tabs-container"></div>
    </div>

    <div id="menu-container" class="menu-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhBcHYHkYgkgdq04hvdg5o-HaSWYb645g",
            authDomain: "hevres.firebaseapp.com",
            projectId: "hevres",
            storageBucket: "hevres.firebasestorage.app",
            messagingSenderId: "135029926033",
            appId: "1:135029926033:web:9605d82e4dddb5cc4d3730",
            measurementId: "G-HVFBN7QP0R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allItems = [];

        async function loadMenu() {
            try {
                const querySnapshot = await getDocs(collection(db, "menu_vitafood"));
                allItems = querySnapshot.docs.map(doc => doc.data());
                renderTabs(allItems);
                renderMenu(allItems);
            } catch (e) { console.error(e); }
        }

        function renderTabs(items) {
            const container = document.getElementById('categories-container');
            const categories = ['הכל', ...new Set(items.map(item => item.category))];
            container.innerHTML = categories.map(cat => `
                <button class="tab-button ${cat === 'הכל' ? 'active' : ''}" 
                        onclick="window.filterMenu('${cat}', this)">${cat}</button>
            `).join('');
        }

        function renderMenu(items) {
            const container = document.getElementById('menu-container');
            const placeholder = 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200';

            container.innerHTML = items.map(item => `
                <div class="menu-item">
                    <div class="item-content">
                        <div>
                            <h3>${item.name}</h3>
                            <p>${item.description || ''}</p>
                        </div>
                        <div class="item-price">₪${item.price}</div>
                    </div>
                    <div class="item-image" style="background-image: url('${item.imageUrl || placeholder}')"></div>
                </div>
            `).join('');
        }

        window.filterMenu = (category, button) => {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            const filtered = category === 'הכל' ? allItems : allItems.filter(i => i.category === category);
            renderMenu(filtered);
        };

        loadMenu();
    </script>
</body>
</html>
