<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vita Food - Premium Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #ff9800;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 0;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1550547660-d9450f859349?w=1000');
            background-size: cover;
            background-position: center;
        }

        .header h1 { color: var(--primary-orange); font-size: 2.8rem; margin: 0; }

        .tabs-wrapper {
            position: sticky;
            top: 0;
            background-color: var(--bg-dark);
            z-index: 1000;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }

        .tabs-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 0 15px;
            scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tab-button {
            padding: 8px 22px;
            background: transparent;
            border: 2px solid var(--primary-orange);
            color: white;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
        }

        .tab-button.active { background: var(--primary-orange); color: black; }

        .menu-grid { padding: 20px; display: grid; gap: 20px; }

        .menu-item {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            height: 120px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeIn 0.6s ease forwards;
        }

        .item-content {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-content h3 { margin: 0; font-size: 1.1rem; color: var(--primary-orange); }
        .item-content p { margin: 5px 0; color: #bbb; font-size: 0.85rem; line-height: 1.2; overflow: hidden; }
        .item-price { font-weight: bold; font-size: 1.1rem; }

        .item-image {
            width: 120px;
            height: 120px;
            background-size: cover;
            background-position: center;
            background-color: #333;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>VITA FOOD</h1>
        <p>חווית בשרים פרימיום</p>
    </div>

    <div class="tabs-wrapper">
        <div id="categories-container" class="tabs-container"></div>
    </div>

    <div id="menu-container" class="menu-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ה-Config האישי שלך שהבאת מה-Firebase Console
        const firebaseConfig = {
            apiKey: "AIzaSyAhBcHYHkYgkgdq04hvdg5o-HaSWYb645g",
            authDomain: "hevres.firebaseapp.com",
            projectId: "hevres",
            storageBucket: "hevres.firebasestorage.app",
            messagingSenderId: "135029926033",
            appId: "1:135029926033:web:9605d82e4dddb5cc4d3730",
            measurementId: "G-HVFBN7QP0R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allItems = [];

        async function loadMenu() {
            try {
                // וודא שבפרויקט 'hevres' אכן יש אוסף בשם 'menu_vitafood'
                const querySnapshot = await getDocs(collection(db, "menu_vitafood"));
                allItems = querySnapshot.docs.map(doc => doc.data());
                renderTabs(allItems);
                renderMenu(allItems);
            } catch (e) { 
                console.error("שגיאה בטעינת הנתונים:", e); 
            }
        }

        function renderTabs(items) {
            const container = document.getElementById('categories-container');
            const categories = ['הכל', ...new Set(items.map(item => item.category))];
            container.innerHTML = categories.map(cat => `
                <button class="tab-button ${cat === 'הכל' ? 'active' : ''}" 
                        onclick="window.filterMenu('${cat}', this)">${cat}</button>
            `).join('');
        }

        function renderMenu(items) {
            const container = document.getElementById('menu-container');
            const placeholder = 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200';

            container.innerHTML = items.map(item => `
                <div class="menu-item">
                    <div class="item-content">
                        <div>
                            <h3>${item.name}</h3>
                            <p>${item.description || ''}</p>
                        </div>
                        <div class="item-price">₪${item.price}</div>
                    </div>
                    <div class="item-image" style="background-image: url('${item.imageUrl || placeholder}')"></div>
                </div>
            `).join('');
        }

        window.filterMenu = (category, button) => {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            const filtered = category === 'הכל' ? allItems : allItems.filter(i => i.category === category);
            renderMenu(filtered);
        };

        loadMenu();
    </script>
</body>
</html>
