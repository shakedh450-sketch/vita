<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vita Food - ויטה פוד</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #f4911e;
            --brand-brown: #2d1a16;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--brand-brown);
            color: white;
            margin: 0;
            min-height: 100vh;
        }

        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to bottom, rgba(45, 26, 22, 0.8), rgba(45, 26, 22, 0.95)), 
                              url('https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
            border-color: var(--brand-orange);
        }

        .logo-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(180deg, var(--brand-brown) 50%, var(--brand-orange) 50%);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .view { display: none; opacity: 0; transition: opacity 0.4s ease; }
        .view.active { display: block; opacity: 1; }

        .price-badge {
            background: var(--brand-orange);
            color: var(--brand-brown);
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 800;
        }

        .menu-header-styled {
            text-align: center;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .food-menu-script {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: var(--brand-orange);
            line-height: 1.2;
            margin-bottom: -15px;
            z-index: 10;
        }

        .tafrit-bold {
            font-size: 4.5rem;
            font-weight: 900;
            color: white;
            opacity: 0.95;
            letter-spacing: -1px;
            line-height: 1;
        }

        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero-bg"></div>

    <div id="home-view" class="view active px-6 pt-12 pb-24">
        <header class="text-center mb-12">
            <div class="logo-circle mb-6">
                <span class="font-black text-lg text-white">VITA</span>
                <span class="font-black text-lg border-t border-white/30 w-full text-center text-white">FOOD</span>
            </div>
            <h1 class="text-4xl font-black text-white mb-2 tracking-tight">VITA FOOD</h1>
            <p class="text-orange-400 font-bold tracking-widest text-sm uppercase">Premium Burgers & Meat</p>
        </header>

        <div class="max-w-md mx-auto space-y-6">
            <div onclick="showView('menu-view')" class="glass-card rounded-3xl p-8 flex flex-col items-center cursor-pointer group">
                <div class="w-16 h-16 bg-orange-500/20 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-orange-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-orange-500 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </div>
                <h2 class="text-2xl font-black mb-1">לתפריט הדיגיטלי</h2>
                <p class="text-gray-400 text-sm">המבורגרים, פרנות ושתייה קרה</p>
            </div>

            <a href="https://search.google.com/local/writereview?placeid=ChIJg-W3-05THBURSuuTalV3WlI" target="_blank" class="glass-card rounded-3xl p-8 flex flex-col items-center group block">
                <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white group-hover:text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-black mb-1">השאירו ביקורת</h2>
                <p class="text-gray-400 text-sm">לחצו לכתיבת חוות דעת בגוגל</p>
            </a>
        </div>
    </div>

    <div id="menu-view" class="view min-h-screen bg-black/90 pb-20">
        <nav class="sticky top-0 bg-black/80 backdrop-blur-md z-50 p-4 border-b border-white/10 flex items-center justify-between">
            <button onclick="showView('home-view')" class="text-orange-500 font-bold flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 rotate-180" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                </svg>
                חזרה
            </button>
            <div class="w-10 h-10 border-2 border-orange-500 rounded-full flex items-center justify-center p-1">
                 <span class="text-[6px] font-bold text-center leading-tight text-orange-500">כשר<br>מהדרין</span>
            </div>
        </nav>

        <div class="max-w-2xl mx-auto px-6 pt-10">
            <div class="menu-header-styled mb-8">
                <div class="food-menu-script">Food Menu</div>
                <div class="tafrit-bold">תפריט</div>
            </div>

            <section class="mb-12">
                <h3 class="text-2xl font-black text-orange-500 border-b-2 border-orange-500/30 pb-2 mb-4 uppercase tracking-tighter">בורגר טיים</h3>
                <div id="burgers-list" class="space-y-4"></div>
            </section>

            <section class="mb-12">
                <h3 class="text-2xl font-black text-orange-500 border-b-2 border-orange-500/30 pb-2 mb-4 uppercase tracking-tighter">ביס של אושר</h3>
                <div id="happy_bite-list" class="space-y-4"></div>
            </section>

            <section class="mb-12">
                <h3 class="text-2xl font-black text-orange-500 border-b-2 border-orange-500/30 pb-2 mb-4 uppercase tracking-tighter">משקאות ובירה</h3>
                <div id="drinks-list" class="grid grid-cols-1 gap-3"></div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhBcHYHkYgkgdq04hvdg5o-HaSWYb645g",
            authDomain: "hevres.firebaseapp.com",
            projectId: "hevres",
            storageBucket: "hevres.firebasestorage.app",
            messagingSenderId: "135029926033",
            appId: "1:135029926033:web:9605d82e4dddb5cc4d3730",
            measurementId: "G-HVFBN7QP0R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.showView = function(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function fetchVitaMenu() {
            try {
                const querySnapshot = await getDocs(collection(db, "menu_vitafood"));
                const containers = {
                    burgers: document.getElementById('burgers-list'),
                    happy_bite: document.getElementById('happy_bite-list'),
                    drinks: document.getElementById('drinks-list')
                };

                Object.values(containers).forEach(c => c.innerHTML = '');

                querySnapshot.forEach((doc) => {
                    const item = doc.data();
                    const category = item.category;

                    if (containers[category]) {
                        const div = document.createElement('div');
                        div.className = "flex justify-between items-center py-2 border-b border-white/5 fade-in";
                        
                        if (category === 'drinks') {
                            div.innerHTML = `<span>${item.icon || ''} ${item.name}</span><span class="font-bold text-orange-500">${item.price} ₪</span>`;
                        } else {
                            div.innerHTML = `
                                <div class="font-bold text-lg">${item.icon || ''} ${item.name}</div>
                                <span class="price-badge">${item.price} ₪</span>
                            `;
                        }
                        containers[category].appendChild(div);
                    }
                });
            } catch (error) {
                console.error("שגיאה בטעינה:", error);
            }
        }

        fetchVitaMenu();
    </script>
</body>
</html>
