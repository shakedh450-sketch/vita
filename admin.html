<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITA FOOD | Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; 
            --card: #1e1e1e; 
            --text: #ffffff;
            --primary: #ff9800;
            --danger: #ff4444; 
            --success: #4caf50; 
            --border: #333333;
        }

        body { font-family: 'Assistant', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; }
        
        .admin-content { max-width: 900px; margin: 0 auto; padding: 30px 20px; display: none; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-bar h1 { color: var(--primary); font-weight: 800; margin: 0; font-size: 1.8rem; }

        .section-card { 
            background: var(--card); padding: 25px; border-radius: 20px; margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .settings-box h4 { margin: 0 0 10px 0; font-size: 0.95rem; color: #aaa; font-weight: 700; }

        input, select, textarea { 
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); 
            background: #111; color: white; font-family: inherit; box-sizing: border-box; font-size: 1rem;
        }

        textarea { height: 120px; resize: vertical; }

        .item-list { display: grid; gap: 15px; }
        .item-card { 
            background: var(--card); padding: 20px; border-radius: 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-right: 6px solid var(--primary);
        }
        .item-card.out-of-stock { border-right-color: var(--danger); opacity: 0.6; }

        .actions { display: flex; gap: 15px; align-items: center; }
        .price-chip { background: #333; padding: 8px 15px; border-radius: 10px; font-weight: 800; color: var(--primary); cursor: pointer; }
        
        .btn-action { background: var(--primary); color: #000; padding: 12px 24px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-danger { background: var(--danger); color: white; margin-bottom: 15px; }

        /* Login */
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: var(--card); padding: 40px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; border: 1px solid var(--border); }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 30px; border-radius: 25px; z-index: 1000; width: 90%; max-width: 420px; border: 1px solid var(--border); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; backdrop-filter: blur(5px); }

        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

<div id="loginSection" class="login-container">
    <div class="login-box">
        <h1 style="color:var(--primary);">VITA FOOD</h1>
        <h2>כניסת מנהל 🍔</h2>
        <input type="email" id="loginEmail" placeholder="אימייל">
        <input type="password" id="loginPassword" placeholder="סיסמה" style="margin-top:15px;">
        <button onclick="window.login()" class="btn-action" style="width:100%; margin-top:25px;">התחבר</button>
        <p id="loginError" style="color:var(--danger); margin-top:15px;"></p>
    </div>
</div>

<div id="adminSection" class="admin-content">
    <div class="header-bar">
        <h1>Control Center 🍔</h1>
        <div style="display:flex; gap:12px;">
            <button class="btn-action" onclick="openModal()">+ מנה חדשה</button>
            <button onclick="window.logout()" style="background:#333; color:white; padding:12px; border-radius:12px; border:none; cursor:pointer;">התנתק</button>
        </div>
    </div>

    <div class="section-card">
        <div class="settings-grid">
            <div class="settings-box">
                <h4>מבצע רץ</h4>
                <input type="text" id="promoText" onchange="window.updateGlobalSettings()">
            </div>
            <div class="settings-box">
                <h4>סטטוס מטבח</h4>
                <select id="kitchenStatus" onchange="window.updateGlobalSettings()">
                    <option value="open">פתוח ✅</option>
                    <option value="busy">עומס ⏳</option>
                    <option value="closed">סגור 🔒</option>
                </select>
            </div>
        </div>
    </div>

    <div class="section-card">
        <h3 style="margin-top:0; color:var(--primary);">הזרקת תפריט מהירה (JSON)</h3>
        <button class="btn-action btn-danger" onclick="window.clearMenu()" style="width:100%; padding:8px;">🗑️ ניקוי תפריט קיים</button>
        <textarea id="json-input" placeholder="הדבק כאן את מערך המנות ששלחתי לך..."></textarea>
        <button class="btn-action" onclick="window.injectMenu()" style="width:100%; margin-top:10px;">הזרק נתונים</button>
    </div>

    <div id="admin-grid" class="item-list"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="itemModal">
    <h3>הוספת מנה</h3>
    <input type="text" id="itemName" placeholder="שם המנה">
    <input type="number" id="itemPrice" placeholder="מחיר" style="margin-top:10px;">
    <select id="itemCategory" style="margin-top:10px;">
        <option value="עסקיות">עסקיות</option>
        <option value="המבורגרים">המבורגרים</option>
        <option value="עיקריות">עיקריות</option>
        <option value="מנות ילדים">מנות ילדים</option>
        <option value="משקאות">משקאות</option>
    </select>
    <textarea id="itemDesc" placeholder="תיאור..." style="margin-top:10px;"></textarea>
    <button onclick="saveItem()" class="btn-action" style="width:100%; margin-top:15px;">שמור</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, onSnapshot, updateDoc, setDoc, getDoc, addDoc, deleteDoc, writeBatch, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYZxPjSML1gHTTANx0Fp6TlhI5_ookHNU",
        authDomain: "hevresbar.firebaseapp.com",
        projectId: "hevresbar",
        storageBucket: "hevresbar.firebasestorage.app",
        messagingSenderId: "737238391891",
        appId: "1:737238391891:web:ad0076917e2f7133eb7aa6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const B_ID = 'vitafood';

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            initAdmin();
        } else {
            document.getElementById('loginSection').style.display = 'flex';
            document.getElementById('adminSection').style.display = 'none';
        }
    });

    window.login = async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        try { await signInWithEmailAndPassword(auth, email, pass); } 
        catch (e) { document.getElementById('loginError').innerText = "פרטים שגויים"; }
    };

    window.logout = () => signOut(auth);

    function initAdmin() {
        getDoc(doc(db, "settings", B_ID)).then(s => {
            if(s.exists()){
                document.getElementById('promoText').value = s.data().promoText || "";
                document.getElementById('kitchenStatus').value = s.data().kitchenStatus || "open";
            }
        });

        onSnapshot(query(collection(db, "menus"), where("businessId", "==", B_ID)), (snap) => {
            const grid = document.getElementById('admin-grid');
            grid.innerHTML = '';
            snap.forEach(d => {
                const item = d.data();
                const isOut = item.isAvailable === false;
                const card = document.createElement('div');
                card.className = `item-card ${isOut ? 'out-of-stock' : ''}`;
                card.innerHTML = `
                    <div><h3>${item.name}</h3><small>${item.category}</small></div>
                    <div class="actions">
                        <div class="price-chip" onclick="window.changePrice('${d.id}', ${item.price})">₪${item.price}</div>
                        <label class="switch">
                            <input type="checkbox" ${!isOut ? 'checked' : ''} onchange="window.toggleStock('${d.id}', this.checked)">
                            <span class="slider"></span>
                        </label>
                        <button onclick="window.deleteItem('${d.id}')" style="background:none; border:none; cursor:pointer;">🗑️</button>
                    </div>`;
                grid.appendChild(card);
            });
        });
    }

    window.injectMenu = async () => {
        const input = document.getElementById('json-input').value.trim();
        try {
            const dishes = JSON.parse(input);
            const batch = writeBatch(db);
            dishes.forEach(dish => {
                const ref = doc(collection(db, "menus"));
                batch.set(ref, { ...dish, businessId: B_ID, isAvailable: true, createdAt: serverTimestamp() });
            });
            await batch.commit();
            alert(`הוזרקו ${dishes.length} מנות!`);
            document.getElementById('json-input').value = "";
        } catch (e) { alert("שגיאה ב-JSON: " + e.message); }
    };

    window.clearMenu = async () => {
        if(!confirm("למחוק הכל?")) return;
        const q = query(collection(db, "menus"), where("businessId", "==", B_ID));
        const snap = await getDocs(q);
        const batch = writeBatch(db);
        snap.forEach(d => batch.delete(d.ref));
        await batch.commit();
        alert("התפריט נוקה!");
    };

    window.updateGlobalSettings = async () => {
        await setDoc(doc(db, "settings", B_ID), {
            promoText: document.getElementById('promoText').value,
            kitchenStatus: document.getElementById('kitchenStatus').value
        }, { merge: true });
    };

    window.toggleStock = async (id, isAvailable) => { await updateDoc(doc(db, "menus", id), { isAvailable }); };
    window.changePrice = async (id, old) => {
        const p = prompt("מחיר חדש:", old);
        if(p) await updateDoc(doc(db, "menus", id), { price: Number(p) });
    };
    window.deleteItem = async (id) => { if(confirm("למחוק?")) await deleteDoc(doc(db, "menus", id)); };

    window.saveItem = async () => {
        const name = document.getElementById('itemName').value;
        const price = Number(document.getElementById('itemPrice').value);
        if(!name || !price) return;
        await addDoc(collection(db, "menus"), {
            name, price, category: document.getElementById('itemCategory').value,
            desc: document.getElementById('itemDesc').value, isAvailable: true, businessId: B_ID
        });
        closeModal();
    };

    window.openModal = () => { document.getElementById('itemModal').style.display='block'; document.getElementById('overlay').style.display='block'; };
    window.closeModal = () => { document.getElementById('itemModal').style.display='none'; document.getElementById('overlay').style.display='none'; };
</script>
</body>
</html>
